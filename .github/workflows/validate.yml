name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Pre-commit (lint, format, secret scan) ─────────────────────────────────
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: terraform_validate,terraform_tflint,terraform_docs

  # ── Markdown lint ──────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          globs: "**/*.md"

  # ── Terraform validate ─────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Find Terraform roots
        id: find-roots
        run: |
          roots=$(find terraform -name "*.tf" -exec dirname {} \; | sort -u | tr '\n' ' ')
          echo "roots=$roots" >> "$GITHUB_OUTPUT"

      - name: Terraform Init (no backend)
        run: |
          for dir in ${{ steps.find-roots.outputs.roots }}; do
            echo "→ $dir"
            terraform -chdir="$dir" init -backend=false -input=false -no-color
          done

      - name: Terraform Validate
        run: |
          for dir in ${{ steps.find-roots.outputs.roots }}; do
            echo "→ $dir"
            terraform -chdir="$dir" validate -no-color
          done

  # ── Helm lint ──────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.4"

      - name: Lint charts
        run: |
          charts=$(find helm/charts -name "Chart.yaml" -exec dirname {} \; | sort -u)
          if [ -z "$charts" ]; then
            echo "No Helm charts found — skipping."
            exit 0
          fi
          for chart in $charts; do
            echo "→ $chart"
            helm lint "$chart"
          done

  # ── Kubernetes manifest validation ─────────────────────────────────────────
  kubeconform:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate manifests
        run: |
          manifests=$(find kubernetes -name "*.yaml" -o -name "*.yml" 2>/dev/null)
          if [ -z "$manifests" ]; then
            echo "No Kubernetes manifests found — skipping."
            exit 0
          fi
          echo "$manifests" | kubeconform \
            -kubernetes-version 1.29.0 \
            -strict \
            -summary

  # ── Security scan ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
