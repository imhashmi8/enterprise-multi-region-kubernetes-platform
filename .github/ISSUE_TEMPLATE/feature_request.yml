name: Feature Request
description: Propose a new platform capability or enhancement
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Feature requests are reviewed weekly by the Platform Engineering team.
        Requests backed by a concrete use case and business justification are prioritised.

  - type: dropdown
    id: area
    attributes:
      label: Platform Area
      options:
        - Infrastructure / Terraform
        - Cluster Configuration
        - GitOps / ArgoCD
        - CI/CD
        - Observability
        - Security
        - Developer Experience
        - Cost Optimisation
        - Networking
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like and how it would work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Business Priority
      options:
        - Critical (blocking production work)
        - High (blocking upcoming work)
        - Medium (quality of life improvement)
        - Low (nice to have)
    validations:
      required: true
